<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in — Daily Intern Report</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="check-in.html" class="nav-link active">Check-in</a>
      <a href="check-out.html" class="nav-link">Check-out</a>
    </nav>
  </header>

  <main class="container">
    <h1>Morning Check-in</h1>
    <p class="subtitle">Log your department goals for today.</p>

    <form id="checkin-form" class="form">
      <div class="form-group">
        <label for="intern-name">Intern name</label>
        <input type="text" id="intern-name" name="internName" required placeholder="Your full name">
      </div>

      <fieldset class="work-fieldset">
        <legend>Department &amp; goal</legend>
        <div id="work-rows" class="work-rows">
          <div class="work-row" data-row="0">
            <div class="form-group">
              <label for="dept-goal-0">Department — goal</label>
              <input type="text" id="dept-goal-0" name="deptGoal[]" required placeholder="e.g. Engineering — Build login page">
            </div>
          </div>
        </div>
        <button type="button" id="add-work" class="btn btn-secondary">+ Work</button>
      </fieldset>

      <button type="submit" class="btn btn-primary">Submit check-in</button>
    </form>

    <p id="checkin-message" class="form-message hidden" role="status"></p>
  </main>

  <script src="db.js"></script>
  <script src="check-in.js"></script>
</body>
</html>
